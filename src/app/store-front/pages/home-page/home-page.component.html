<h1 class="text-3xl font-bold font-montserrat">Todos los productos</h1>
<h2 class="text-xl mb-5">Para todos los gustos</h2>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 mt-2 gap-5">

@if (productsResorce.isLoading()) {
    @for (i of [1,2,3,4,5,6,7,8,9]; track i) {
        <util-skeleton></util-skeleton>
    }
} @else {
    @for (product of productsResorce.value()?.products ; track $index) {
        <product-card [product]="product"/>
    } @empty {
        <p>No hay productos</p>
    }  
}
    
</div>

<app-pagination  
[pages]="productsResorce.value()?.pages ?? 0" 
[currentPage]="paginationService.currentPage()"
></app-pagination>
