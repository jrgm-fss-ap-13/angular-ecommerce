<form class="flex flex-col gap-3">

  <!-- Full Name -->
  <label class="input input-bordered flex items-center gap-2">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"
      fill="currentColor" class="h-4 w-4 opacity-70">
      <path d="M10 8a3 3 0 1 0-4 0 5 5 0 0 0-4 4v1h12v-1a5 5 0 0 0-4-4Z" />
    </svg>
    <input type="text" class="grow" placeholder="Full Name" />
  </label>

  <!-- Email -->
  <label class="input input-bordered flex items-center gap-2">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"
      fill="currentColor" class="h-4 w-4 opacity-70">
      <path
        d="M2.5 3A1.5 1.5 0 0 0 1 4.5v.793l6.674 3.217c.206.1.446.1.652 0L15 5.293V4.5A1.5 1.5 0 0 0 13.5 3h-11Z" />
      <path
        d="M15 6.954 8.978 9.86a2.25 2.25 0 0 1-1.956 0L1 6.954V11.5A1.5 1.5 0 0 0 2.5 13h11a1.5 1.5 0 0 0 1.5-1.5V6.954Z" />
    </svg>
    <input type="email" class="grow" placeholder="Email" />
  </label>

  <!-- Password -->
  <label class="input input-bordered flex items-center gap-2">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"
      fill="currentColor" class="h-4 w-4 opacity-70">
      <path fill-rule="evenodd"
        d="M8 1a4 4 0 0 0-4 4v1H3.5A1.5 1.5 0 0 0 2 7.5v5A1.5 1.5 0 0 0 3.5 14h9A1.5 1.5 0 0 0 14 12.5v-5A1.5 1.5 0 0 0 12.5 6H12V5a4 4 0 0 0-4-4ZM6 5a2 2 0 1 1 4 0v1H6V5Z"
        clip-rule="evenodd" />
    </svg>
    <input type="password" class="grow" placeholder="Password" />
  </label>

  <!-- Confirm Password -->
  <label class="input input-bordered flex items-center gap-2">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"
      fill="currentColor" class="h-4 w-4 opacity-70">
      <path fill-rule="evenodd"
        d="M8 1a4 4 0 0 0-4 4v1H3.5A1.5 1.5 0 0 0 2 7.5v5A1.5 1.5 0 0 0 3.5 14h9A1.5 1.5 0 0 0 14 12.5v-5A1.5 1.5 0 0 0 12.5 6H12V5a4 4 0 0 0-4-4ZM6 5a2 2 0 1 1 4 0v1H6V5Z"
        clip-rule="evenodd" />
    </svg>
    <input type="password" class="grow" placeholder="Confirm Password" />
  </label>

  <!-- Error Confirm Password -->
  <span class="text-error text-sm hidden">
    Las contraseñas no coinciden.
  </span>

  <!-- Submit -->
  <button class="btn btn-secondary mt-2" type="submit">
    Registrarse
  </button>

</form>
